<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURTLESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dan-red: #c1272d; --dan-red-dark: #a31f24; --bg-gray: #f8f9fa;
            --text-main: #111111; --text-sub: #666666; --border-color: #eaeaea;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; color: var(--text-main); background-color: #ffffff; line-height: 1.6; overflow-x: hidden; }

        /* 헤더 스타일 */
        header { position: sticky; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--dan-red); letter-spacing: -1px; cursor: pointer; }
        
        .hamburger { display: none; font-size: 30px; cursor: pointer; color: var(--text-main); }
        .close-menu { display: none; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 700; font-size: 16px; transition: color 0.2s ease; }
        .nav-links a:hover { color: var(--dan-red); }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: white; min-width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 0; z-index: 1000; border: 1px solid var(--border-color); margin-top: 15px; }
        .dropdown-content.show { display: flex; flex-direction: column; }
        .dropdown-content a { padding: 10px 20px; text-decoration: none; display: block; color: var(--text-main); font-size: 15px; font-weight: 500; text-align: center; }
        .dropdown-content a:hover { background-color: var(--bg-gray); color: var(--dan-red); }

        .login-btn { background-color: transparent; color: var(--text-main); border: 1px solid var(--text-main); padding: 8px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-left: 10px; }
        .login-btn:hover { background-color: var(--text-main); color: white; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 250px; height: 100vh; background: white; flex-direction: column; align-items: flex-start; padding: 80px 30px 30px 30px; transition: right 0.3s ease; z-index: 1001; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
            .nav-links.active { right: 0; }
            .close-menu { display: block; position: absolute; top: 20px; right: 25px; font-size: 35px; background: none; border: none; cursor: pointer; }
            .nav-links > a, .nav-links .dropdown, .login-btn { width: 100%; margin: 10px 0; text-align: left; margin-left: 0; }
            .dropdown-content { position: static; box-shadow: none; border: none; min-width: 100%; padding-left: 15px;}
        }

        /* 이미지 슬라이더 스타일 */
        .hero-slider { position: relative; width: 100%; height: 65vh; min-height: 450px; background-color: #222; overflow: hidden; }
        .slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; color: white; padding: 0 20px; opacity: 0; 
            transition: opacity 1s ease-in-out; z-index: 1;
            background-size: cover; background-position: center;
        }
        .slide::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }
        .slide.active { opacity: 1; z-index: 2; }
        .slide h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .slide p { font-size: 1.3rem; font-weight: 400; opacity: 0.95; text-shadow: 0 1px 5px rgba(0,0,0,0.3); }
        
        @media (max-width: 768px) { .slide h1 { font-size: 2.2rem; } .slide p { font-size: 1.1rem; } }

        .slider-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
        .slider-dot { width: 12px; height: 12px; background-color: rgba(255, 255, 255, 0.4); border-radius: 50%; cursor: pointer; }
        .slider-dot.active { background-color: white; }

        .section { width: 100%; padding: 80px 5%; }
        .inner { max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 50px; text-align: center; }

        /* 모달 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 30px; border-radius: 20px; position: relative; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-gray); }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; border: none; background: none; }
        
        .slide-edit-box { background: #f1f1f1; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--dan-red); }
        .slide-edit-box h4 { margin-bottom: 10px; font-size: 0.9rem; color: #555; }
        .action-btn { width: 100%; background-color: var(--dan-red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #admin-panel { display: none; margin-top: 30px; padding: 30px; background: white; border-radius: 16px; border: 1px solid var(--border-color); border-left: 6px solid #000; }
        #member-actions { display: none; margin-top: 20px; }

        .youtube-main-card { display: block; text-decoration: none; color: #111; background: white; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s; }
        .youtube-thumb-large { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .youtube-info-large { padding: 20px; }

        footer { background-color: #111; color: #888; padding: 60px 5%; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">TURTLESS</div>
        <div class="hamburger" id="hamburger">☰</div>
        <div class="nav-links" id="nav-links">
            <button class="close-menu" id="close-menu">×</button>
            <div class="dropdown">
                <a href="#" class="drop-btn" id="intro-btn">소개</a>
                <div class="dropdown-content" id="intro-dropdown">
                    <a href="intro_team.html">팀 소개</a>
                    <a href="intro_member.html">팀원 소개</a>
                    <a href="intro_career.html">경력</a>
                </div>
            </div>
            <a href="activity.html">주요 활동</a>
            <a href="minigame.html">미니게임</a>
            <button class="login-btn" id="login-btn-top" onclick="openLoginModal()">팀원 로그인</button>
        </div>
    </header>

    <section class="hero-slider" id="hero-slider">
        <div id="slider-content"></div>
        <div class="slider-nav" id="slider-dots"></div>
    </section>

    <section class="section">
        <div class="inner">
            <div id="admin-panel">
                <h3>👑 관리자 패널 (권우진 전용)</h3>
                <p>구글 드라이브에 사진을 올린 뒤 공유 링크를 그대로 붙여넣으셔도 잘 작동합니다!</p>
                <button onclick="openSliderEditModal()" class="action-btn" style="width: auto; padding: 10px 20px; margin-top:15px; background:#000;">슬라이더 이미지/문구 수정</button>
            </div>

            <div id="member-actions">
                <button onclick="openPwModal()" style="padding: 10px 20px; border-radius: 8px; border:1px solid #ddd; background:#fff; cursor:pointer; font-weight:bold;">비밀번호 변경</button>
            </div>

            <h2 class="section-title" style="margin-top:60px;">Latest News</h2>
            <div id="youtube-auto-list"></div>
        </div>
    </section>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeLoginModal()">×</button>
            <h2>팀원 로그인</h2>
            <select id="school">
                <option value="경기기계공업고">경기기계공업고</option>
                <option value="경복비즈니스고">경복비즈니스고</option>
                <option value="서울공업고">서울공업고</option>
                <option value="서울매그넷고">서울매그넷고</option>
                <option value="선린인터넷고">선린인터넷고</option>
                <option value="용산고">용산고</option>
                <option value="용산철도고">용산철도고</option>
            </select>
            <select id="grade"><option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option></select>
            <input type="text" id="username" placeholder="이름 (공백없이)">
            <input type="password" id="password" placeholder="비밀번호">
            <button id="login-submit-btn" class="action-btn" onclick="firebaseLogin()">인증하기</button>
        </div>
    </div>

    <div id="slider-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeSliderEditModal()">×</button>
            <h2>슬라이더 수정 (5개)</h2>
            <div id="slider-inputs-container"></div>
            <button class="action-btn" onclick="saveSliderData()">DB 저장 및 실시간 적용</button>
        </div>
    </div>

    <div id="pw-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closePwModal()">×</button>
            <h2>비밀번호 변경</h2>
            <input type="password" id="old-pw" placeholder="현재 비밀번호">
            <input type="password" id="new-pw" placeholder="새 비밀번호">
            <button class="action-btn" onclick="changePassword()">변경하기</button>
        </div>
    </div>

    <footer>
        <p>© 2026 TURTLESS TEAM. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyhSEWtN-y6o9Myt-cDe9193QWv11rbTU",
            authDomain: "turtless-web.firebaseapp.com",
            projectId: "turtless-web"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUserId = null; let currentUserData = null;

        // 모달 제어
        window.openLoginModal = () => document.getElementById('login-modal').style.display = 'flex';
        window.closeLoginModal = () => document.getElementById('login-modal').style.display = 'none';
        window.openSliderEditModal = () => { buildSliderEditInputs(); document.getElementById('slider-edit-modal').style.display = 'flex'; };
        window.closeSliderEditModal = () => document.getElementById('slider-edit-modal').style.display = 'none';
        window.openPwModal = () => document.getElementById('pw-modal').style.display = 'flex';
        window.closePwModal = () => document.getElementById('pw-modal').style.display = 'none';

        // 로그인 로직
        window.firebaseLogin = async function() {
            const school = document.getElementById('school').value;
            const grade = document.getElementById('grade').value;
            const name = document.getElementById('username').value.replace(/\s+/g, '');
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-submit-btn');

            btn.innerText = "인증 중..."; btn.disabled = true;
            try {
                const q = query(collection(db, "users"), where("school", "==", school), where("grade", "==", grade), where("name", "==", name), where("pass", "==", pass));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    currentUserId = snap.docs[0].id; currentUserData = snap.docs[0].data();
                    alert(currentUserData.name + "님 인증 성공!");
                    closeLoginModal();
                    document.getElementById('login-btn-top').innerText = "로그아웃";
                    document.getElementById('login-btn-top').onclick = () => location.reload();
                    document.getElementById('member-actions').style.display = 'block';
                    if(currentUserData.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
                } else { alert("정보가 일치하지 않습니다."); }
            } catch(e) { console.error(e); }
            btn.innerText = "인증하기"; btn.disabled = false;
        };

        // 비밀번호 변경 로직 (복구 완료!)
        window.changePassword = async function() {
            const oldPw = document.getElementById('old-pw').value;
            const newPw = document.getElementById('new-pw').value.trim();
            
            if(oldPw !== currentUserData.pass) {
                alert("현재 비밀번호가 일치하지 않습니다.");
                return;
            }
            if(!newPw) {
                alert("새 비밀번호를 입력해주세요.");
                return;
            }
            
            try {
                await updateDoc(doc(db, "users", currentUserId), { pass: newPw });
                alert("비밀번호가 성공적으로 변경되었습니다!");
                currentUserData.pass = newPw;
                document.getElementById('old-pw').value = '';
                document.getElementById('new-pw').value = '';
                closePwModal();
            } catch(e) { 
                alert("비밀번호 변경 실패"); 
            }
        };

        // 이미지 슬라이더 기본 세팅 데이터
        let sliderData = [
            { title: "Back to the Beginning", sub: "SSRC 프로젝트", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1200" },
            { title: "Slide 2", sub: "Description", img: "" },
            { title: "Slide 3", sub: "Description", img: "" },
            { title: "Slide 4", sub: "Description", img: "" },
            { title: "Slide 5", sub: "Description", img: "" }
        ];

        // 구글 드라이브 일반 링크를 이미지 직링크로 변환하는 함수
        function getDirectLink(url) {
            if (!url) return '';
            if (url.includes('drive.google.com')) {
                let id = '';
                if (url.includes('/file/d/')) {
                    id = url.split('/file/d/')[1].split('/')[0];
                } else if (url.includes('id=')) {
                    id = url.split('id=')[1].split('&')[0];
                }
                if (id) return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        async function loadSlider() {
            try {
                const snap = await getDoc(doc(db, "settings", "main_slider"));
                if(snap.exists()) sliderData = snap.data().slides;
            } catch(e) {}
            renderSlider();
        }

        let slideIdx = 0;
        let timer;

        function renderSlider() {
            const content = document.getElementById('slider-content');
            const dots = document.getElementById('slider-dots');
            content.innerHTML = ''; dots.innerHTML = '';
            
            sliderData.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `slide ${i === 0 ? 'active' : ''}`;
                
                // 구글 드라이브 링크 자동 변환 시스템 적용
                const imgUrl = getDirectLink(s.img);
                if(imgUrl) div.style.backgroundImage = `url('${imgUrl}')`;
                
                div.innerHTML = `<h1>${s.title}</h1><p>${s.sub}</p>`;
                content.appendChild(div);

                const dot = document.createElement('div');
                dot.className = `slider-dot ${i === 0 ? 'active' : ''}`;
                dot.onclick = () => showSlide(i);
                dots.appendChild(dot);
            });
            startTimer();
        }

        function showSlide(n) {
            slideIdx = n;
            document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === n));
            document.querySelectorAll('.slider-dot').forEach((d, i) => d.classList.toggle('active', i === n));
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                slideIdx = (slideIdx + 1) % sliderData.length;
                showSlide(slideIdx);
            }, 5000);
        }

        // 관리자 슬라이더 수정 기능
        window.buildSliderEditInputs = () => {
            const container = document.getElementById('slider-inputs-container');
            container.innerHTML = '';
            sliderData.forEach((s, i) => {
                container.innerHTML += `
                    <div class="slide-edit-box">
                        <h4>슬라이드 ${i+1}</h4>
                        <input type="text" id="edit-img-${i}" value="${s.img}" placeholder="구글 드라이브 공유 링크 또는 이미지 주소">
                        <input type="text" id="edit-title-${i}" value="${s.title}" placeholder="제목">
                        <input type="text" id="edit-sub-${i}" value="${s.sub}" placeholder="부제목">
                    </div>`;
            });
        };

        window.saveSliderData = async () => {
            if(currentUserData?.role !== 'admin') return;
            const newSlides = [];
            for(let i=0; i<5; i++){
                newSlides.push({
                    img: document.getElementById(`edit-img-${i}`).value.trim(),
                    title: document.getElementById(`edit-title-${i}`).value,
                    sub: document.getElementById(`edit-sub-${i}`).value
                });
            }
            try {
                await setDoc(doc(db, "settings", "main_slider"), { slides: newSlides });
                sliderData = newSlides;
                alert("저장 성공!"); closeSliderEditModal(); renderSlider();
            } catch(e) { alert("저장 실패"); }
        };

        window.onload = () => { fetchYouTube(); loadSlider(); };

        // 유튜브 로드
        async function fetchYouTube() {
            const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=UC8QwTy46OaCGdTauiPYkeow')}`;
            try {
                const res = await fetch(api); const data = await res.json();
                if(data.status === 'ok') {
                    const v = data.items[0];
                    document.getElementById('youtube-auto-list').innerHTML = `
                        <a href="${v.link}" target="_blank" class="youtube-main-card">
                            <img src="${v.thumbnail}" class="youtube-thumb-large">
                            <div class="youtube-info-large"><h4>${v.title}</h4><span>New Video</span></div>
                        </a>`;
                }
            } catch(e) {}
        }
    </script>
    
    <script>
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('nav-links');
        hamburger.onclick = () => nav.classList.add('active');
        document.getElementById('close-menu').onclick = () => nav.classList.remove('active');
        
        function toggleDrop(e, id) {
            e.preventDefault();
            document.getElementById(id).classList.toggle('show');
        }
        document.getElementById('intro-btn').onclick = (e) => toggleDrop(e, 'intro-dropdown');
    </script>
</body>
</html>
