<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURTLESS | Youth Engineering Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dan-red: #c1272d; --dan-red-dark: #a31f24; --bg-gray: #f8f9fa;
            --text-main: #111111; --text-sub: #666666; --border-color: #eaeaea;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; color: var(--text-main); background-color: #ffffff; line-height: 1.6; overflow-x: hidden; }

        header { position: sticky; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 18px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--dan-red); letter-spacing: -1.5px; cursor: pointer; }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 700; font-size: 15px; transition: color 0.2s; cursor: pointer; }
        .nav-links a:hover { color: var(--dan-red); }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: white; min-width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 0; z-index: 1000; border: 1px solid var(--border-color); margin-top: 15px; }
        .dropdown-content.show { display: flex; flex-direction: column; }
        .dropdown-content a { padding: 10px 20px; text-decoration: none; display: block; color: var(--text-main); font-size: 14px; font-weight: 500; text-align: center; }
        .dropdown-content a:hover { background-color: var(--bg-gray); color: var(--dan-red); }
        .login-btn { background-color: transparent; color: var(--text-main); border: 1.5px solid var(--text-main); padding: 7px 18px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .login-btn:hover { background-color: var(--text-main); color: white; }

        @media (max-width: 992px) {
            .hamburger { display: block; font-size: 28px; cursor: pointer; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 260px; height: 100vh; background: white; flex-direction: column; align-items: flex-start; padding: 80px 30px; transition: right 0.3s ease; z-index: 1001; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
            .nav-links.active { right: 0; }
            .close-menu { display: block; position: absolute; top: 20px; right: 25px; font-size: 30px; background: none; border: none; cursor: pointer; }
        }

        #page-home { display: block; }
        .subpage { display: none; padding: 80px 5%; min-height: 80vh; animation: fadeIn 0.4s ease-in-out; }
        .subpage.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 슬라이더 */
        .hero-slider { position: relative; width: 100%; height: 55vh; min-height: 400px; background-color: var(--dan-red); overflow: hidden; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 0 20px; opacity: 0; transition: opacity 1s ease-in-out; z-index: 1; background-size: cover; background-position: center; }
        .slide::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: -1; }
        .slide.active { opacity: 1; z-index: 2; }
        .slide h1 { font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900; letter-spacing: -1.5px; margin-bottom: 15px; }

        .slider-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        .slider-dot { width: 8px; height: 8px; background-color: rgba(255, 255, 255, 0.4); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .slider-dot.active { background-color: white; width: 24px; border-radius: 10px; }

        .section { width: 100%; padding: 60px 5%; }
        .section.gray { background-color: var(--bg-gray); }
        .inner { max-width: 1200px; margin: 0 auto; }
        .section-subtitle { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--text-main); border-bottom: 3px solid var(--dan-red); display: inline-block; padding-bottom: 3px; }

        /* 💡 6개 칸 균형 레이아웃 (PC) */
        .master-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 24px; 
            align-items: start; 
        }
        .column-yt, .column-info { 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }

        /* 💡 모바일 화면(768px 이하)에서 6칸 레이아웃 깨짐 방지 */
        @media (max-width: 768px) {
            .master-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 통일된 6칸 직사각형 규격 */
        .unified-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            aspect-ratio: 16 / 10.5;
            text-decoration: none;
            color: inherit;
        }
        .unified-card:hover { transform: translateY(-5px); border-color: var(--dan-red); }

        .card-top { flex: 1.3; overflow: hidden; background: #000; position: relative; }
        .card-top img { width: 100%; height: 100%; object-fit: cover; }
        .card-bottom { flex: 1; padding: 18px 22px; display: flex; flex-direction: column; justify-content: center; }
        .card-bottom h4 { font-size: 1rem; font-weight: 800; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .info-card { padding: 22px; justify-content: flex-start; }
        .home-photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; height: 100%; }
        .home-photo-item { border-radius: 8px; overflow: hidden; background: #f0f0f0; }
        .home-photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .notice-board { overflow-y: auto; }
        .notice-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .notice-badge { background: var(--dan-red); color: white; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; margin-right: 12px; font-weight: 800; min-width: 38px; text-align: center; }
        .notice-item p { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .banner-card { background: linear-gradient(135deg, var(--dan-red), var(--dan-red-dark)); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .banner-card h3 { font-size: 1.2rem; margin-bottom: 15px; font-weight: 900; }
        .banner-card a { background: white; color: var(--dan-red); padding: 10px 24px; border-radius: 30px; font-weight: 800; font-size: 13px; text-decoration: none; transition: 0.3s; cursor: pointer; }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .member-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .photo-area { aspect-ratio: 1/1; background: #f5f5f5; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .info-area { padding: 15px; }
        .info-area .school { font-size: 0.75rem; color: var(--dan-red); font-weight: 800; margin-bottom: 3px; }
        .info-area .name { font-size: 1.1rem; font-weight: 900; }

        #admin-panel, #member-actions { display: none; margin-top: 30px; padding: 25px; border-radius: 16px; border-left: 6px solid var(--dan-red); background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .editable-content { transition: 0.2s; border-radius: 4px; }
        body.edit-mode .editable-content { border: 2px dashed var(--dan-red) !important; background: rgba(193,39,45,0.05); cursor: text; padding: 3px; }
        #save-float-btn { display: none; position: fixed; bottom: 30px; right: 30px; z-index: 9999; padding: 15px 30px; background: var(--dan-red); color: white; font-weight: 900; border-radius: 50px; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; }
        .action-btn { width: 100%; padding: 14px; background: var(--dan-red); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <button id="save-float-btn" onclick="window.savePageContent()">💾 전체 변경사항 저장</button>

    <header>
        <div class="logo" onclick="navigate('home')">TURTLESS</div>
        <div class="hamburger" onclick="document.getElementById('nav-links').classList.add('active')">☰</div>
        <div class="nav-links" id="nav-links">
            <button class="close-menu" onclick="document.getElementById('nav-links').classList.remove('active')">×</button>
            <div class="dropdown">
                <a href="#" class="drop-btn" onclick="toggleDrop('intro-dropdown')">소개</a>
                <div class="dropdown-content" id="intro-dropdown">
                    <a onclick="navigate('intro_team')">팀 소개</a>
                    <a onclick="navigate('intro_member')">팀원 소개</a>
                    <a onclick="navigate('intro_career')">경력</a>
                    <a onclick="navigate('intro_slogan')">슬로건</a>
                    <a onclick="navigate('intro_logo')">로고</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="drop-btn" onclick="toggleDrop('value-dropdown')">가치</a>
                <div class="dropdown-content" id="value-dropdown">
                    <a onclick="navigate('value_core')">핵심가치</a>
                    <a onclick="navigate('value_social')">사회공헌</a>
                    <a onclick="navigate('value_esg')">ESG 경영</a>
                </div>
            </div>
            <a onclick="navigate('activity')">주요 활동</a>
            <a onclick="navigate('pr_gallery')">PR 갤러리</a>
            <a onclick="navigate('sponsorship')">후원문의</a>
            <a onclick="navigate('minigame')">미니게임</a>
            <button class="login-btn" onclick="openLoginModal()">팀원 로그인</button>
        </div>
    </header>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" style="position:absolute; top:20px; right:20px; border:none; background:none; font-size:24px; cursor:pointer;" onclick="closeLoginModal()">×</button>
            <h2 style="text-align:center; margin-bottom:20px; font-weight:900;">팀원 인증</h2>
            <select id="school">
                <option value="경기기계공업고">경기기계공업고</option><option value="경복비즈니스고">경복비즈니스고</option>
                <option value="서울공업고">서울공업고</option><option value="서울매그넷고">서울매그넷고</option>
                <option value="선린인터넷고">선린인터넷고</option><option value="용산고">용산고</option><option value="용산철도고">용산철도고</option>
            </select>
            <select id="grade"><option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option></select>
            <input type="text" id="username" placeholder="이름 (예: 권우진)">
            <input type="password" id="password" placeholder="비밀번호">
            <button class="action-btn" onclick="firebaseLogin()">인증하기</button>
        </div>
    </div>

    <div id="slider-edit-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <button class="close-btn" style="float:right; border:none; background:none; font-size:20px; cursor:pointer;" onclick="closeSliderEditModal()">×</button>
            <h2 style="margin-bottom:20px; font-weight:900;">슬라이더 개별 관리</h2>
            <div id="slider-inputs-container"></div>
            <button class="action-btn" onclick="saveSliderData()">데이터 동기화 저장</button>
        </div>
    </div>

    <div id="page-home">
        <section class="hero-slider" id="hero-slider">
            <div id="slider-content"></div>
            <div class="slider-nav" id="slider-dots"></div>
        </section>

        <section class="section gray">
            <div class="inner">
                <div class="master-grid">
                    <div class="column-yt" id="youtube-auto-list">
                        <h2 class="section-subtitle">Youtube Media</h2>
                    </div>
                    
                    <div class="column-info">
                        <h2 class="section-subtitle">Realtime Hub</h2>
                        
                        <div class="unified-card info-card" onclick="navigate('pr_gallery')" style="cursor:pointer;">
                            <div class="home-photo-grid" id="home-gallery-4grid"></div>
                        </div>
                        
                        <div class="unified-card info-card notice-board" id="home-notice-board">
                        </div>
                        
                        <div class="unified-card banner-card">
                            <h3 id="banner-title" class="editable-content">TURTLESS와 함께할<br>파트너를 찾습니다</h3>
                            <a onclick="navigate('sponsorship')">후원 문의하기 →</a>
                        </div>
                    </div>
                </div>

                <div id="member-actions">
                    <h3 style="color: var(--dan-red); margin-bottom: 10px;">📋 팀원 대시보드</h3>
                    <p id="welcome-msg" style="font-weight:700;"></p>
                </div>

                <div id="admin-panel">
                    <h3 style="margin-bottom:12px; font-weight:900;">👑 관리자 패널</h3>
                    <div style="display:flex; gap:10px;">
                        <button onclick="openSliderEditModal()" style="padding:10px 20px; cursor:pointer; background:#111; color:white; border:none; border-radius:10px; font-weight:800; font-size:13px;">슬라이더 편집</button>
                        <button id="toggle-edit-btn" onclick="window.toggleEditMode()" style="padding:10px 20px; cursor:pointer; background:#28a745; color:white; border:none; border-radius:10px; font-weight:800; font-size:13px;">📝 직접 텍스트 수정 켜기</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section id="page-intro_team" class="subpage section"><div class="inner"><h2 class="subpage-title">팀 소개</h2><div class="content-card"><div id="b-intro_team" class="editable-content"></div></div></div></section>
    <section id="page-intro_member" class="subpage section"><div class="inner"><h2 class="subpage-title">Team Members</h2><div id="member-list" class="member-grid"></div></div></section>
    <section id="page-activity" class="subpage section"><div class="inner"><h2 class="subpage-title">주요 활동</h2><div id="activity-dynamic-list"></div></div></section>
    <section id="page-pr_gallery" class="subpage section"><div class="inner"><h2 class="subpage-title">PR 갤러리</h2><div id="gallery-dynamic-grid" class="gallery-grid"></div></div></section>
    <section id="page-project" class="subpage section"><div class="inner"><h2 class="subpage-title">Project Report</h2><div class="content-card"><div id="b-proj" class="editable-content"></div></div></div></section>
    <section id="page-sponsorship" class="subpage section"><div class="inner"><h2 class="subpage-title">후원문의</h2><div class="content-card"><div id="b-spon" class="editable-content"></div></div></div></section>

    <footer style="background:#111; color:#555; padding:40px 5%; text-align:center; font-size:14px;"><p>© 2026 TURTLESS TEAM. All rights reserved.</p></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, setDoc, addDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyhSEWtN-y6o9Myt-cDe9193QWv11rbTU",
            authDomain: "turtless-web.firebaseapp.com",
            projectId: "turtless-web",
            storageBucket: "turtless-web.firebasestorage.app",
            messagingSenderId: "794305996729",
            appId: "1:794305996729:web:cf7132e77cc5621c5bb868"
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const storage = getStorage(app); 

        let currentUserId = null; let currentUserData = null;
        let isEditMode = false; let cachedGallery = [];

        async function loadMembers() {
            const list = document.getElementById('member-list');
            if(!list) return;
            try {
                const snap = await getDocs(collection(db, "users"));
                let arr = []; snap.forEach(d => arr.push(d.data()));
                arr.sort((a,b) => a.school === b.school ? a.name.localeCompare(b.name) : a.school.localeCompare(b.school));
                let h = '';
                arr.forEach(m => {
                    const img = m.profileImage || "2093.jpg";
                    h += `<div class="member-card"><div class="photo-area"><img src="${img}"></div><div class="info-area"><div class="school">${m.school}</div><div class="name">${m.name}</div></div></div>`;
                });
                list.innerHTML = h;
            } catch(e){}
        }

        async function loadActivities() {
            const notice = document.getElementById('home-notice-board');
            const ytList = document.getElementById('youtube-auto-list');
            try {
                const snap = await getDocs(collection(db, "activities"));
                let items = []; snap.forEach(d => items.push({id:d.id, ...d.data()}));
                items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

                if(notice) {
                    let nh = '';
                    items.slice(0,4).forEach(i => {
                        const isN = (Date.now() - (i.createdAt||0)) < 86400000 ? '<span class="new-badge">NEW</span>' : '';
                        nh += `<div class="notice-item" onclick="window.goAct('${i.id}')"><span class="notice-badge">소식</span><p>${i.title} ${isN}</p></div>`;
                    });
                    notice.innerHTML = nh || '<p style="text-align:center; font-size:13px; color:#999; padding-top:20px;">최신 소식 없음</p>';
                }

                if(ytList) {
                    ytList.innerHTML = '<h2 class="section-subtitle">Youtube Media</h2>';
                    const channelId = "UC8QwTy46OaCGdTauiPYkeow"; 
                    const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}&_cacheBuster=${Date.now()}`;
                    
                    fetch(apiUrl)
                    .then(res => res.json())
                    .then(data => {
                        if(data.items && data.items.length > 0) {
                            data.items.slice(0, 3).forEach(item => {
                                const videoId = item.link.split('v=')[1];
                                const thumbUrl = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                                ytList.innerHTML += `
                                <a href="${item.link}" target="_blank" class="unified-card">
                                    <div class="card-top"><img src="${thumbUrl}"></div>
                                    <div class="card-bottom"><h4>${item.title}</h4></div>
                                </a>`;
                            });
                        } else {
                            ytList.innerHTML += `<p style="padding: 20px; text-align: center; color: #999;">영상을 불러올 수 없습니다.</p>`;
                        }
                    })
                    .catch(err => {
                        ytList.innerHTML += `<p style="padding: 20px; text-align: center; color: #999;">유튜브 연동 중 오류가 발생했습니다.</p>`;
                    });
                }
            } catch(e){}
        }

        window.goAct = (id) => { navigate('activity'); setTimeout(() => { const el = document.getElementById('act-'+id); if(el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 300); };

        async function loadGallery() {
            try {
                const snap = await getDocs(collection(db, "gallery"));
                cachedGallery = []; snap.forEach(d => cachedGallery.push({id:d.id, ...d.data()}));
                cachedGallery.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                
                const homeGrid = document.getElementById('home-gallery-4grid');
                if(homeGrid) {
                    let gh = '';
                    for(let i=0; i<4; i++) {
                        const src = cachedGallery[i] ? cachedGallery[i].url : "2093.jpg";
                        gh += `<div class="home-photo-item"><img src="${src}"></div>`;
                    }
                    homeGrid.innerHTML = gh;
                }
            } catch(e){}
        }

        window.firebaseLogin = async () => {
            const s = document.getElementById('school').value; const g = document.getElementById('grade').value;
            const n = document.getElementById('username').value.trim(); const p = document.getElementById('password').value.trim();
            const qU = query(collection(db, "users"), where("school","==",s), where("grade","==",g), where("name","==",n), where("pass","==",p));
            const snap = await getDocs(qU);
            if(!snap.empty) {
                currentUserId = snap.docs[0].id; currentUserData = snap.docs[0].data();
                alert(n + "님 인증됨."); closeLoginModal();
                document.getElementById('welcome-msg').innerText = `${s} ${g} [${n}] 팀원 계정`;
                if(currentUserData.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
                loadActivities(); loadGallery();
            } else { alert("정보 오류"); }
        };

        window.toggleEditMode = () => {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.querySelectorAll('.editable-content').forEach(el => el.contentEditable = isEditMode);
            document.getElementById('save-float-btn').style.display = isEditMode ? 'block' : 'none';
        };
        window.savePageContent = async () => {
            let data = {}; document.querySelectorAll('.editable-content').forEach(el => data[el.id] = el.innerHTML);
            await setDoc(doc(db, "settings", "page_content"), data, {merge:true});
            alert("저장됨."); window.toggleEditMode();
        };

        let sliderData = [
            {title:"“Back to the Beginning, Beyond the Ocean”", sub:"서울시 고등학교 23명의 학생들이 만드는 TURTLESS", img:""},
            {title:"", sub:"", img:""}, {title:"", sub:"", img:""}, {title:"", sub:"", img:""}, {title:"", sub:"", img:""}
        ];
        async function loadSlider() {
            try { const s = await getDoc(doc(db, "settings", "main_slider")); if(s.exists()) sliderData = s.data().slides; } catch(e){}
            const c = document.getElementById('slider-content'); const d = document.getElementById('slider-dots');
            c.innerHTML = ''; d.innerHTML = '';
            sliderData.forEach((s, i) => {
                c.innerHTML += `<div class="slide ${i===0?'active':''}" style="background-image:url('${s.img}')"><h1>${s.title}</h1><p>${s.sub}</p></div>`;
                d.innerHTML += `<div class="slider-dot ${i===0?'active':''}" onclick="showS(${i})"></div>`;
            });
            startS();
        }
        window.showS = (n) => { 
            const sls = document.querySelectorAll('.slide'); const dots = document.querySelectorAll('.slider-dot');
            if(!sls.length) return;
            sls.forEach((s,i) => s.classList.toggle('active', i===n));
            dots.forEach((s,i) => s.classList.toggle('active', i===n));
        };
        function startS() { setInterval(() => { 
            const sls = document.querySelectorAll('.slide');
            if(!sls.length) return;
            let curr = Array.from(sls).findIndex(s => s.classList.contains('active'));
            showS((curr + 1) % sls.length); 
        }, 5000); }

        window.openSliderEditModal = () => {
            let h = ''; sliderData.forEach((s,i) => {
                h += `<div style="background:#f5f5f5; padding:10px; margin-bottom:10px;">
                    <strong>슬라이드 ${i+1}</strong><br>
                    <input id="s-img-${i}" value="${s.img}" placeholder="이미지 주소"><br>
                    <input id="s-t-${i}" value="${s.title}" placeholder="제목"><br>
                    <input id="s-s-${i}" value="${s.sub}" placeholder="부제">
                </div>`;
            });
            document.getElementById('slider-inputs-container').innerHTML = h;
            document.getElementById('slider-edit-modal').style.display = 'flex';
        };
        window.saveSliderData = async () => {
            let news = []; for(let i=0; i<5; i++) news.push({ img:document.getElementById(`s-img-${i}`).value, title:document.getElementById(`s-t-${i}`).value, sub:document.getElementById(`s-s-${i}`).value });
            await setDoc(doc(db, "settings", "main_slider"), { slides:news });
            location.reload();
        };

        window.toggleDrop = (id) => {
            document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show');
        };
        window.openLoginModal = () => document.getElementById('login-modal').style.display='flex';
        window.closeLoginModal = () => document.getElementById('login-modal').style.display='none';
        window.closeSliderEditModal = () => document.getElementById('slider-edit-modal').style.display='none';

        window.addEventListener('DOMContentLoaded', () => {
            loadMembers(); loadSlider(); loadActivities(); loadGallery();
            getDoc(doc(db, "settings", "page_content")).then(s => { if(s.exists()){ let d = s.data(); document.querySelectorAll('.editable-content').forEach(el => { if(d[el.id]) el.innerHTML = d[el.id]; }); } });
        });

        window.navigate = function(id) {
            document.getElementById('page-home').style.display = id === 'home' ? 'block' : 'none';
            document.querySelectorAll('.subpage').forEach(p => p.classList.remove('active'));
            if(id !== 'home') document.getElementById('page-'+id).classList.add('active');
            document.getElementById('nav-links').classList.remove('active');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            window.scrollTo(0,0);
        };
    </script>
</body>
</html>
