<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURTLESS - 용산철도고 팀 홍보</title>
    <style>
        /* 단청색 팔레트 */
        :root {
            --dan-green: #005b4f; /* 옥색/초록 */
            --dan-red: #c1272d;   /* 붉은색 */
            --dan-yellow: #fbb03b;/* 노란색 */
            --dan-blue: #1e3b70;  /* 청색 */
            --dan-bg: #f4ebd0;    /* 한지 느낌 배경 */
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dan-bg);
            color: #333;
        }

        /* 헤더 및 네비게이션 */
        header {
            background-color: var(--dan-green);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--dan-red);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--dan-yellow);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--dan-yellow);
        }

        .menu-btn {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* 모바일 메뉴 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 0;
                background-color: var(--dan-green);
                width: 100%;
                text-align: center;
                padding: 20px 0;
                border-bottom: 5px solid var(--dan-red);
            }
            .nav-links.active {
                display: flex;
            }
            .menu-btn {
                display: block;
            }
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 로그인 폼 */
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        input, select, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: var(--dan-blue);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--dan-red);
        }

        /* 숨겨진 콘텐츠 (로그인 후 표시) */
        #dashboard {
            display: none;
        }

        /* 관리자 전용 메뉴 */
        #admin-panel {
            display: none;
            background-color: var(--dan-yellow);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
        }

        /* 미디어 섹션 */
        .media-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .media-box {
            flex: 1;
            min-width: 300px;
            background: #eee;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        iframe {
            max-width: 100%;
            border-radius: 5px;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ⚠️ 여기에 본인의 Firebase 설정 키를 넣어야 실제 로그인이 작동합니다!
        const firebaseConfig = {
            apiKey: "본인의_API_KEY",
            authDomain: "본인의_DOMAIN",
            projectId: "본인의_PROJECT_ID",
            storageBucket: "본인의_BUCKET",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdefg"
        };

        // 아직 키를 넣지 않았을 때 에러가 나지 않도록 임시 방어 코드
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.log("Firebase가 아직 설정되지 않았습니다.");
        }

        // 글로벌 함수로 등록 (HTML 버튼에서 호출하기 위함)
        window.login = async function() {
            const school = document.getElementById('school').value;
            const grade = document.getElementById('grade').value;
            const name = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!db) {
                alert("Firebase 데이터베이스가 아직 연결되지 않았습니다. 코드에 설정 키를 입력해주세요!");
                return;
            }

            try {
                // 파이어베이스 DB 'users' 컬렉션에서 정보 검색
                const usersRef = collection(db, "users");
                const q = query(usersRef, 
                    where("school", "==", school), 
                    where("grade", "==", grade), 
                    where("name", "==", name),
                    where("pass", "==", pass)
                );

                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // 로그인 성공
                    const userData = querySnapshot.docs[0].data();
                    alert(`환영합니다, ${userData.school} ${userData.name} 팀원님!`);
                    
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('welcome-message').innerText = `환영합니다, ${userData.name}님!`;
                    
                    // 권우진 학생 (관리자) 권한 처리
                    if (userData.role === "admin") {
                        document.getElementById('admin-panel').style.display = 'block';
                        document.getElementById('admin-menu-link').style.display = 'inline';
                    }
                } else {
                    alert("정보가 일치하지 않거나 비밀번호가 틀렸습니다.");
                }
            } catch (error) {
                console.error("로그인 에러:", error);
                alert("로그인 처리 중 오류가 발생했습니다.");
            }
        };

        window.toggleMenu = function() {
            document.getElementById('nav-links').classList.toggle('active');
        };
    </script>
</head>
<body>

    <header>
        <div class="logo">TURTLESS</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="nav-links">
            <a href="#">팀 소개</a>
            <a href="#">게시판</a>
            <a href="#">갤러리</a>
            <a href="#" id="admin-menu-link" style="display:none; color: var(--dan-yellow);">[메뉴 수정]</a>
        </div>
    </header>

    <div class="container">
        <div id="login-section">
            <h2 style="text-align:center; color: var(--dan-blue);">팀원 로그인</h2>
            <select id="school">
                <option value="경기기계공업고">경기기계공업고</option>
                <option value="경복비즈니스고">경복비즈니스고</option>
                <option value="서울공업고">서울공업고</option>
                <option value="서울매그넷고">서울매그넷고</option>
                <option value="선린인터넷고">선린인터넷고</option>
                <option value="용산고">용산고</option>
                <option value="용산철도고">용산철도고</option>
            </select>
            <select id="grade">
                <option value="1학년">1학년</option>
                <option value="2학년">2학년</option>
                <option value="3학년">3학년</option>
            </select>
            <input type="text" id="username" placeholder="이름 입력 (예: 권우진)">
            <input type="password" id="password" placeholder="초기 비밀번호 6자리">
            <button onclick="login()">접속하기</button>
        </div>

        <div id="dashboard">
            <h2 id="welcome-message"></h2>
            
            <div id="admin-panel">
                👑 관리자 권한 확인됨: 3선 메뉴 및 항목 수정 권한이 활성화되었습니다.
                <button style="margin-left: 10px; background-color: var(--dan-red);">메뉴 편집기 열기</button>
            </div>

            <div style="margin-bottom: 30px; background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
                <h3>새 게시글 작성</h3>
                <textarea style="width: 100%; height: 100px; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc;" placeholder="내용을 입력하세요..."></textarea><br><br>
                <button>게시글 등록 (준비중)</button>
            </div>

            <div class="media-section">
                <div class="media-box">
                    <h3>YouTube 영상</h3>
                    <iframe width="100%" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="media-box">
                    <h3>Instagram 갤러리</h3>
                    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-top: 15px;">
                        <div style="background:#ddd; height:100px; display:flex; align-items:center; justify-content:center; border-radius:5px;">사진 1</div>
                        <div style="background:#ddd; height:100px; display:flex; align-items:center; justify-content:center; border-radius:5px;">사진 2</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
