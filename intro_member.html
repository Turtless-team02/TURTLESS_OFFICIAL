<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 소개 - TURTLESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dan-red: #c1272d; --bg-gray: #f8f9fa; --text-main: #111111; --text-sub: #666666; --border-color: #eaeaea; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; color: var(--text-main); background-color: var(--bg-gray); }

        /* 상단 메뉴바 (index.html과 동일) */
        header { position: sticky; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--dan-red); cursor: pointer; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 700; }

        /* 본문 영역 */
        .container { max-width: 1200px; margin: 80px auto; padding: 0 5%; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }
        p.subtitle { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 50px; }

        /* 명함형 팀원 그리드 */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        
        .member-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); transition: transform 0.3s; }
        .member-card:hover { transform: translateY(-5px); border-color: var(--dan-red); }
        
        /* 사진 영역 & NO IMAGE */
        .photo-area { width: 100%; aspect-ratio: 1/1; background-color: #e2e2e2; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .no-image { color: #999; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }

        .info-area { padding: 20px; text-align: left; }
        .info-area .school { font-size: 0.9rem; color: var(--dan-red); font-weight: 700; margin-bottom: 5px; }
        .info-area .name { font-size: 1.3rem; font-weight: 800; color: var(--text-main); }
        .info-area .grade { font-size: 0.9rem; color: var(--text-sub); margin-left: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">TURTLESS</div>
        <div class="nav-links"><a href="index.html">← 메인으로 돌아가기</a></div>
    </header>

    <div class="container">
        <h1>TURTLESS 팀원 소개</h1>
        <p class="subtitle">지속가능한 미래를 만들어가는 23명의 팀원들을 소개합니다.</p>
        
        <div id="member-list" class="member-grid">
            <p style="grid-column: 1/-1; text-align:center; padding: 50px; color:#888;">데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyhSEWtN-y6o9Myt-cDe9193QWv11rbTU",
            authDomain: "turtless-web.firebaseapp.com",
            projectId: "turtless-web"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadMembers() {
            const listDiv = document.getElementById('member-list');
            try {
                // 가나다 순(학교 기준) 정렬해서 불러오기
                const q = query(collection(db, "users"), orderBy("school"), orderBy("name"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    listDiv.innerHTML = '<p style="grid-column: 1/-1;">등록된 팀원이 없습니다.</p>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    // 사진 URL이 있으면 이미지를, 없으면 NO IMAGE 텍스트 출력
                    const photoHtml = data.photoUrl 
                        ? `<img src="${data.photoUrl}" alt="${data.name} 사진">` 
                        : `<div class="no-image">NO IMAGE</div>`;

                    html += `
                        <div class="member-card">
                            <div class="photo-area">
                                ${photoHtml}
                            </div>
                            <div class="info-area">
                                <div class="school">${data.school}</div>
                                <div class="name">${data.name} <span class="grade">${data.grade}</span></div>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;

            } catch (error) {
                console.error(error);
                listDiv.innerHTML = '<p style="grid-column: 1/-1; color:red;">데이터를 불러오지 못했습니다.</p>';
            }
        }

        window.onload = loadMembers;
    </script>

</body>
</html>
