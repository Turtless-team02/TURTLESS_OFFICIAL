<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 소개 - TURTLESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dan-red: #c1272d; --text-main: #111111; --text-sub: #666666; --border-color: #eaeaea; --bg-gray: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; color: var(--text-main); background-color: var(--bg-gray); line-height: 1.6; }

        /* 상단 네비게이션 헤더 (index.html과 동일) */
        header { position: sticky; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--dan-red); cursor: pointer; }
        .hamburger { display: none; font-size: 30px; cursor: pointer; color: var(--text-main); }
        .close-menu { display: none; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 700; font-size: 16px; transition: color 0.2s ease; }
        .nav-links a:hover { color: var(--dan-red); }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: white; min-width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 0; z-index: 1000; border: 1px solid var(--border-color); margin-top: 15px; }
        .dropdown-content.show { display: flex; flex-direction: column; }
        .dropdown-content a { padding: 10px 20px; text-decoration: none; display: block; color: var(--text-main); font-size: 15px; font-weight: 500; text-align: center; }
        .dropdown-content a:hover { background-color: var(--bg-gray); color: var(--dan-red); }

        .login-btn { background-color: transparent; color: var(--text-main); border: 1px solid var(--text-main); padding: 8px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-left: 10px; }
        .login-btn:hover { background-color: var(--text-main); color: white; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 250px; height: 100vh; background: white; flex-direction: column; align-items: flex-start; padding: 80px 30px 30px 30px; transition: right 0.3s ease; z-index: 1001; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
            .nav-links.active { right: 0; }
            .close-menu { display: block; position: absolute; top: 20px; right: 25px; font-size: 35px; background: none; border: none; cursor: pointer; }
            .nav-links > a, .nav-links .dropdown, .login-btn { width: 100%; margin: 10px 0; text-align: left; }
            .dropdown-content { position: static; box-shadow: none; border: none; min-width: 100%; padding-left: 15px;}
            .dropdown-content a { text-align: left; padding: 8px 10px; }
        }

        /* 팀원 소개 섹션 */
        .section { width: 100%; padding: 80px 5%; max-width: 1200px; margin: 0 auto; text-align: center;}
        .section h2 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 800; }
        
        /* 로그인 시 나타나는 내 사진 등록 버튼 */
        #photo-action-container { display: none; margin-bottom: 40px; }
        .upload-btn { background: var(--dan-red); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(193, 39, 45, 0.3); transition: all 0.3s; }
        .upload-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(193, 39, 45, 0.4); }

        /* 팀원 카드 그리드 */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .member-card { background: white; border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .member-card:hover { transform: translateY(-10px); }
        
        /* 💡 마우스 올리면 사진 바뀌는 효과 핵심 CSS */
        .profile-img-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background-color: #eee; }
        .profile-img-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s ease-in-out; }
        .img-hover { opacity: 0; }
        .profile-img-wrap:hover .img-default { opacity: 0; }
        .profile-img-wrap:hover .img-hover { opacity: 1; }

        .member-info { padding: 20px; text-align: center; }
        .member-school { font-size: 0.9rem; color: var(--dan-red); font-weight: 800; margin-bottom: 5px; }
        .member-name { font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
        .member-grade { font-size: 0.9rem; color: var(--text-sub); margin-top: 2px; }

        /* 모달 스타일 공통 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 40px; border-radius: 20px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text-sub); }
        .modal-content h2 { margin-bottom: 25px; font-size: 1.5rem; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background-color: var(--bg-gray); }
        .modal-content .action-btn { width: 100%; background-color: var(--dan-red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .file-label { display: block; text-align: left; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: var(--text-main); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='index.html'">TURTLESS</div>
        <div class="hamburger" id="hamburger">☰</div>
        
        <div class="nav-links" id="nav-links">
            <button class="close-menu" id="close-menu">×</button>
            <div class="dropdown">
                <a href="#" class="drop-btn" id="intro-btn">소개</a>
                <div class="dropdown-content" id="intro-dropdown">
                    <a href="intro_team.html">팀 소개</a>
                    <a href="intro_member.html">팀원 소개</a>
                    <a href="intro_career.html">경력</a>
                    <a href="intro_slogan.html">슬로건</a>
                    <a href="intro_logo.html">로고</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="drop-btn" id="value-btn">가치</a>
                <div class="dropdown-content" id="value-dropdown">
                    <a href="value_core.html">핵심가치</a>
                    <a href="value_social.html">사회공헌</a>
                    <a href="value_slogan.html">슬로건</a>
                    <a href="value_esg.html">ESG</a>
                </div>
            </div>
            <a href="activity.html">주요 활동</a>
            <a href="pr_gallery.html">PR 갤러리</a>
            <a href="sponsorship.html">후원문의</a>
            <a href="minigame.html">미니게임</a>
            
            <button class="login-btn" id="login-btn-top" onclick="openLoginModal()">팀원 로그인</button>
        </div>
    </header>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeLoginModal()">×</button>
            <h2>팀원 인증</h2>
            <select id="school">
                <option value="경기기계공업고">경기기계공업고</option>
                <option value="경복비즈니스고">경복비즈니스고</option>
                <option value="서울공업고">서울공업고</option>
                <option value="서울매그넷고">서울매그넷고</option>
                <option value="선린인터넷고">선린인터넷고</option>
                <option value="용산고">용산고</option>
                <option value="용산철도고">용산철도고</option>
            </select>
            <select id="grade">
                <option value="1학년">1학년</option>
                <option value="2학년">2학년</option>
                <option value="3학년">3학년</option>
            </select>
            <input type="text" id="username" placeholder="이름 (예: 권우진)">
            <input type="password" id="password" placeholder="비밀번호">
            <button class="action-btn" onclick="firebaseLogin()">인증하기</button>
        </div>
    </div>

    <div id="photo-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closePhotoModal()">×</button>
            <h2>내 프로필 사진 등록</h2>
            
            <label class="file-label">1. 기본 사진 (평소에 보일 사진)</label>
            <input type="file" id="img-default-upload" accept="image/*">
            
            <label class="file-label" style="margin-top: 15px;">2. 재미있는 사진 (마우스 올렸을 때)</label>
            <input type="file" id="img-hover-upload" accept="image/*">
            
            <button class="action-btn" onclick="uploadPhotos()">저장하기</button>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px; text-align: center;">*정사각형으로 보이는 것이 예쁩니다.</p>
        </div>
    </div>

    <div class="section">
        <h2>Our Team</h2>
        <p style="margin-bottom:20px; color:var(--text-sub);">마우스 커서를 팀원 사진 위에 올려보세요!</p>
        
        <div id="photo-action-container">
            <button class="upload-btn" onclick="openPhotoModal()">📸 내 프로필 사진 등록/변경하기</button>
        </div>

        <div class="team-grid" id="team-grid-container">
            <p style="text-align: center; width: 100%;">데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 사용자님의 파이어베이스 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyAyhSEWtN-y6o9Myt-cDe9193QWv11rbTU",
            authDomain: "turtless-web.firebaseapp.com",
            projectId: "turtless-web",
            storageBucket: "turtless-web.firebasestorage.app",
            messagingSenderId: "794305996729",
            appId: "1:794305996729:web:cf7132e77cc5621c5bb868"
        };
        
        let db;
        try { const app = initializeApp(firebaseConfig); db = getFirestore(app); } catch (e) {}

        let currentUserId = null;
        let currentUserData = null;

        // 모달 열기/닫기
        window.openLoginModal = () => document.getElementById('login-modal').style.display = 'flex';
        window.closeLoginModal = () => document.getElementById('login-modal').style.display = 'none';
        window.openPhotoModal = () => document.getElementById('photo-modal').style.display = 'flex';
        window.closePhotoModal = () => document.getElementById('photo-modal').style.display = 'none';

        // 1. 파이어베이스에서 전체 팀원 불러오기
        async function fetchTeamMembers() {
            if(!db) return;
            const container = document.getElementById('team-grid-container');
            container.innerHTML = ''; // 초기화

            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let members = [];
                querySnapshot.forEach((doc) => { members.push(doc.data()); });

                // 학교 이름순으로 정렬
                members.sort((a, b) => a.school.localeCompare(b.school) || a.name.localeCompare(b.name));

                let html = '';
                members.forEach(member => {
                    // 등록된 사진이 없으면 뜰 기본 회색 이미지
                    const defaultImg = member.imgDefault ? member.imgDefault : 'https://via.placeholder.com/400x400/dddddd/666666?text=No+Image';
                    const hoverImg = member.imgHover ? member.imgHover : defaultImg;

                    html += `
                    <div class="member-card">
                        <div class="profile-img-wrap">
                            <img src="${defaultImg}" class="img-default" alt="${member.name} 기본사진">
                            <img src="${hoverImg}" class="img-hover" alt="${member.name} 호버사진">
                        </div>
                        <div class="member-info">
                            <div class="member-school">${member.school}</div>
                            <div class="member-name">${member.name}</div>
                            <div class="member-grade">${member.grade}</div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error("데이터 불러오기 실패:", error);
                container.innerHTML = '<p>팀원 정보를 불러올 수 없습니다.</p>';
            }
        }

        // 페이지 열리자마자 명단 불러오기 실행
        window.onload = fetchTeamMembers;

        // 2. 로그인 기능
        window.firebaseLogin = async function() {
            const school = document.getElementById('school').value;
            const grade = document.getElementById('grade').value;
            const name = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            try {
                const q = query(collection(db, "users"), where("school", "==", school), where("grade", "==", grade), where("name", "==", name), where("pass", "==", pass));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    currentUserId = querySnapshot.docs[0].id;
                    currentUserData = querySnapshot.docs[0].data();
                    
                    alert(`${currentUserData.name} 팀원님 환영합니다! 이제 사진을 등록할 수 있습니다.`);
                    closeLoginModal();
                    
                    // 사진 등록 버튼 보이기
                    document.getElementById('photo-action-container').style.display = 'block';
                    document.getElementById('login-btn-top').innerText = '로그아웃';
                    document.getElementById('login-btn-top').onclick = () => location.reload();
                } else {
                    alert("정보가 일치하지 않거나 비밀번호가 틀렸습니다.");
                }
            } catch (error) { console.error(error); }
        };

        // 3. 사진 압축 함수 (용량을 줄여서 텍스트 형태로 변환)
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 400; // 최대 가로세로 크기 400px로 압축
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 압축된 데이터를 텍스트로 반환
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    callback(dataUrl);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // 4. 사진 저장 로직
        window.uploadPhotos = async function() {
            const fileDefault = document.getElementById('img-default-upload').files[0];
            const fileHover = document.getElementById('img-hover-upload').files[0];

            if(!fileDefault && !fileHover) {
                alert("등록할 사진을 선택해주세요."); return;
            }

            let updateData = {};
            let processed = 0;
            let totalToProcess = (fileDefault ? 1 : 0) + (fileHover ? 1 : 0);

            const finalizeUpdate = async () => {
                try {
                    const userRef = doc(db, "users", currentUserId);
                    await updateDoc(userRef, updateData);
                    alert("사진이 성공적으로 변경되었습니다!");
                    closePhotoModal();
                    fetchTeamMembers(); // 바뀐 사진으로 새로고침
                } catch (error) {
                    console.error("사진 업데이트 에러:", error);
                    alert("오류가 발생했습니다.");
                }
            };

            if(fileDefault) {
                compressImage(fileDefault, (base64) => {
                    updateData.imgDefault = base64;
                    processed++;
                    if(processed === totalToProcess) finalizeUpdate();
                });
            }
            if(fileHover) {
                compressImage(fileHover, (base64) => {
                    updateData.imgHover = base64;
                    processed++;
                    if(processed === totalToProcess) finalizeUpdate();
                });
            }
        };
    </script>

    <script>
        const hamburgerBtn = document.getElementById('hamburger');
        const closeMenuBtn = document.getElementById('close-menu');
        const navLinks = document.getElementById('nav-links');
        hamburgerBtn.addEventListener('click', () => { navLinks.classList.add('active'); });
        closeMenuBtn.addEventListener('click', () => { navLinks.classList.remove('active'); });

        function toggleDropdown(e, dropdownId) {
            e.preventDefault(); 
            const dropdowns = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].id !== dropdownId && dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
            document.getElementById(dropdownId).classList.toggle('show');
        }
        document.getElementById('intro-btn').addEventListener('click', function(e) { toggleDropdown(e, 'intro-dropdown'); });
        document.getElementById('value-btn').addEventListener('click', function(e) { toggleDropdown(e, 'value-dropdown'); });
        window.addEventListener('click', function(e) {
            if (!e.target.matches('.drop-btn')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) { dropdowns[i].classList.remove('show'); }
            }
        });
    </script>
</body>
</html>
